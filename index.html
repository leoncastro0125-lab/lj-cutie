<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Analytics Clone</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 14px;
            font-size: 14px;
        }

        .video-container {
            margin: 12px;
        }

        .video-thumb {
            height: 240px;
            border-radius: 14px;
            background: url('thumbnail.jpg') center/cover no-repeat;
            position: relative;
            overflow: hidden;
        }

        .video-thumb::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent 50%);
        }

        .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65px;
            height: 65px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .play-btn::before {
            content: "";
            border-style: solid;
            border-width: 12px 0 12px 18px;
            border-color: transparent transparent transparent white;
            margin-left: 5px;
        }

        .video-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            padding: 3px 6px;
            border-radius: 6px;
            z-index: 2;
        }

        .caption {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            font-size: 13px;
            font-weight: bold;
            z-index: 2;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 14px 0;
        }

        .stat {
            text-align: center;
            font-size: 13px;
        }

        .stat strong {
            display: block;
            font-size: 16px;
        }

        .tabs {
            display: flex;
            gap: 16px;
            padding: 10px 14px;
            border-bottom: 1px solid #222;
        }

        .tab {
            color: #888;
        }

        .tab.active {
            color: white;
            border-bottom: 2px solid white;
            padding-bottom: 4px;
        }

        .section {
            padding: 14px;
            border-bottom: 1px solid #1f1f1f;
        }

        .title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-top: 6px;
        }

        .progress {
            height: 6px;
            background: #222;
            border-radius: 10px;
            margin-top: 4px;
        }

        .progress-bar {
            height: 100%;
            background: #fe2c55;
            border-radius: 10px;
        }

        canvas {
            width: 100% !important;
            max-height: 180px;
        }
    </style>
</head>

<body>

    <div class="header">
        <span>←</span>
        <span>Video analysis</span>
        <span>⋯</span>
    </div>

    <div class="video-container">
        <div class="video-thumb">
            <div class="play-btn"></div>
            <span class="video-duration">12.77s</span>
            <div class="caption">
                when i hear this playing knowing im about to watch this masterpiece again
            </div>
        </div>
    </div>

    <div class="stats">
        <div class="stat"><strong>13K</strong>Views</div>
        <div class="stat"><strong>6</strong>Likes</div>
        <div class="stat"><strong>0</strong>Comments</div>
        <div class="stat"><strong>0</strong>Shares</div>
        <div class="stat"><strong>0</strong>Saves</div>
    </div>

    <div class="tabs">
        <div class="tab">Overview</div>
        <div class="tab active">Viewers</div>
        <div class="tab">Engagement</div>
    </div>

    <div class="section">
        <div class="title">Viewer Types</div>

        <div class="row"><span>New viewers</span><span>89%</span></div>
        <div class="progress"><div class="progress-bar" style="width:89%"></div></div>

        <div class="row"><span>Returning viewers</span><span>11%</span></div>
        <div class="progress"><div class="progress-bar" style="width:11%"></div></div>
    </div>

    <div class="section">
        <div class="title">Gender</div>
        <canvas id="genderChart"></canvas>
    </div>

</body>

<script>
    new Chart(document.getElementById("genderChart"), {
        type: "doughnut",
        data: {
            labels: ["Male", "Female", "Other"],
            datasets: [{
                data: [81, 19, 0],
                backgroundColor: ["#fe2c55", "#25f4ee", "#444"],
                borderWidth: 0
            }]
        },
        options: {
            plugins: {
                legend: { display: false }
            }
        }
    });
</script>

</html>
